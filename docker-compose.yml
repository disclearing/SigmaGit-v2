services:
  # ─── Infrastructure ───────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: sigmagit
      POSTGRES_PASSWORD: sigmagit
      POSTGRES_DB: sigmagit
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U sigmagit -d sigmagit']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Applications (dev - live source mounts, hot reload) ──────────────────────

  api:
    image: oven/bun:1.2
    restart: unless-stopped
    user: root
    working_dir: /app
    # bun install at monorepo root, then run API in watch mode
    command: sh -c "bun install && cd apps/api && bun run --watch src/index.ts"
    volumes:
      # :z relabels the bind mount for SELinux (required on Fedora/RHEL with rootless Podman)
      - .:/app:z
      # Isolate node_modules inside the container so host deps don't interfere
      - api_modules:/app/node_modules
    ports:
      - '3001:3001'
    env_file:
      - .env
    environment:
      NODE_ENV: development
      PORT: '3001'
      # Override to use Docker service hostnames
      DATABASE_URL: postgres://sigmagit:sigmagit@postgres:5432/sigmagit
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    image: oven/bun:1.2
    restart: unless-stopped
    user: root
    working_dir: /app
    # --host 0.0.0.0 makes Vite reachable outside the container
    command: sh -c "bun install && cd apps/web && bunx vite dev --host 0.0.0.0"
    volumes:
      - .:/app:z
      - web_modules:/app/node_modules
    ports:
      - '3000:3000'
    env_file:
      - .env
    environment:
      NODE_ENV: development
      # Server-side (SSR) API URL - container-to-container
      API_URL: http://api:3001
      # Client-side API URL - browser hits the mapped host port
      VITE_API_URL: http://localhost:3001
    depends_on:
      - api

  docs:
    image: oven/bun:1.2
    restart: unless-stopped
    user: root
    working_dir: /app
    command: sh -c "bun install && cd apps/docs && bun run dev"
    volumes:
      - .:/app:z
      - docs_modules:/app/node_modules
    ports:
      - '3002:3002'
    environment:
      NODE_ENV: development

volumes:
  postgres_data:
  redis_data:
  # Cached node_modules per service - survives restarts, avoids reinstalling every time
  api_modules:
  web_modules:
  docs_modules:
