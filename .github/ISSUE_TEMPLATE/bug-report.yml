name: Bug report
description: Report a reproducible bug or regression
title: '[Bug]: '
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.

        Please include enough detail for us to reproduce the issue. If this affects a specific area of Sigmagit, mention it clearly (web, API, mobile, docs, Discord bot, runner, or database).
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      description: Which part of the project is affected?
      options:
        - Web app
        - API
        - Mobile app
        - Docs
        - Discord bot
        - Runner
        - Database
        - Other
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Bug summary
      description: What happened?
      placeholder: A concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps needed to reproduce the issue.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What actually happened instead?
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include versions, platform, browser, device, and any relevant setup details.
      placeholder: |
        - OS:
        - Browser:
        - Bun:
        - Node.js:
        - App area:
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste logs, stack traces, screenshots, or screen recordings if available.
      render: shell
